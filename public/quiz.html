<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - DayaHack</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <main class="quiz-container">
      <div class="quiz-header">
        <div class="quiz-info">
          <h2 id="categoryName"></h2>
          <span id="progressText" class="question-counter">Question 1/60</span>
        </div>
        <div class="quiz-timer">
          <div id="timerDisplay" class="timer-display">15</div>
          <p>Secondes</p>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>

      <div id="quizContainer" class="quiz-content">
        <div id="questionContainer" class="question-container">
          <!-- Questions will be rendered here -->
        </div>

        <!-- Quiz Actions -->
        <div class="quiz-actions">
          <button id="validateBtn" class="btn btn-primary" onclick="submitCurrentQuestion()">✓ Valider</button>
          <button id="skipBtn" class="btn btn-secondary" onclick="skipQuestion()">Sauter</button>
          <a href="/categories" class="btn btn-secondary">Annuler</a>
        </div>
      </div>

      <!-- Results Screen (hidden initially) -->
      <div id="resultsContainer" style="display: none;">
        <div class="quiz-content result-screen">
          <h2>Quiz Terminé!</h2>
          <div class="result-box">
            <p class="score-value" id="scoreValue">0</p>
            <p class="score-text">sur <span id="totalQuestions">60</span> questions</p>
            <p class="percentage" id="percentageValue">0%</p>
            <p id="resultMessage" style="margin-top: 15px; font-size: 1.1em; color: var(--text-color);"></p>
          </div>
          <a href="/categories" class="btn btn-primary">Retour aux catégories</a>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/quiz-data.js"></script>
  <script src="/js/quiz-new.js"></script>
</body>
</html>
