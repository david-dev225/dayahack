<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayaHack - Quiz de Présélection</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .test-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .welcome-box {
      text-align: center;
      padding: 40px;
      margin-bottom: 40px;
    }

    .welcome-box h1 {
      font-size: 3em;
      color: var(--primary-color);
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(255, 149, 0, 0.3);
    }

    .welcome-box p {
      font-size: 1.1em;
      color: var(--text-color);
      margin-bottom: 30px;
    }

    .quiz-content {
      display: none;
    }

    .quiz-content.active {
      display: block;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }

    .category-btn {
      background: linear-gradient(135deg, #ff9500 0%, #ff7b00 100%);
      color: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      border: none;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .category-btn:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 40px rgba(255, 149, 0, 0.4);
    }

    .category-btn .count {
      font-size: 0.85em;
      opacity: 0.9;
      margin-top: 10px;
    }

    .question-card {
      background: #222;
      border: 1px solid rgba(255, 149, 0, 0.2);
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 30px;
    }

    .question-card h3 {
      color: var(--primary-color);
      margin-bottom: 25px;
      font-size: 1.2em;
      line-height: 1.4;
    }

    .question-progress {
      color: var(--text-color);
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .option-btn {
      background: #333;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 15px 20px;
      color: var(--text-color);
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }

    .option-btn:hover {
      background: #3a3a3a;
      border-color: var(--primary-color);
    }

    .option-btn.selected {
      background: rgba(255, 149, 0, 0.2);
      border-color: var(--primary-color);
      color: var(--primary-color);
      font-weight: 600;
    }

    .quiz-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }

    .btn-next {
      background: linear-gradient(135deg, #ff9500 0%, #ff7b00 100%);
      color: #1a1a1a;
      padding: 12px 40px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
    }

    .btn-back {
      background: transparent;
      color: var(--primary-color);
      padding: 12px 40px;
      font-weight: 700;
      border: 2px solid var(--primary-color);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
    }

    .results-box {
      background: linear-gradient(135deg, rgba(255, 149, 0, 0.1) 0%, rgba(255, 123, 0, 0.1) 100%);
      border: 1px solid rgba(255, 149, 0, 0.2);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
    }

    .score-display {
      font-size: 3em;
      color: var(--primary-color);
      font-weight: 800;
      margin: 20px 0;
    }

    .percentage {
      font-size: 1.5em;
      color: var(--primary-color);
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <!-- Welcome Section -->
    <div id="welcomeSection" class="welcome-box">
      <h1>DayaHack</h1>
      <p>Quiz de Présélection - Hackathon Génie Logiciel</p>
      <p style="font-size: 1em; opacity: 0.8;">60 questions · 6 catégories · 4 propositions par question</p>
    </div>

    <!-- Categories Section -->
    <div id="categoriesSection" class="quiz-content active">
      <h2 style="text-align: center; margin-bottom: 40px;">Choisissez une catégorie</h2>
      <div id="categoriesContainer" class="categories-grid"></div>
    </div>

    <!-- Quiz Section -->
    <div id="quizSection" class="quiz-content">
      <div id="quizContainer"></div>
      <div class="quiz-actions">
        <button class="btn-back" onclick="backToCategories()">← Retour</button>
        <button class="btn-next" onclick="nextQuestion()" id="nextBtn">Suivant →</button>
      </div>
    </div>

    <!-- Results Section -->
    <div id="resultsSection" class="quiz-content">
      <div class="results-box">
        <h2>Quiz Terminé!</h2>
        <div class="score-display" id="scoreDisplay">0/0</div>
        <div class="percentage" id="percentageDisplay">0%</div>
        <p id="categoryDisplay" style="font-size: 1.1em; color: var(--text-color); margin-top: 20px;"></p>
        <button class="btn-next" style="margin-top: 30px;" onclick="backToCategories()">← Faire un autre quiz</button>
      </div>
    </div>
  </div>

  <script src="/js/test-quiz.js"></script>
</body>
</html>
